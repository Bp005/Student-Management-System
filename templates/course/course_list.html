{% extends 'base.html' %}

{% block content %}
<h2>All Courses</h2>
<table class="table table-striped">
    <thead class="table-dark">
        <tr>
            <th>Code</th>
            <th>Course Name</th>
            <th>Description</th>
        </tr>
    </thead>
    <tbody>
        {% for course in courses %}
        <tr>
            <td><strong>{{ course.code }}</strong></td>
            <td>{{ course.name }}</td>
            <td>{{ course.desription|truncatewords:10 }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
