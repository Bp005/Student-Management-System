{% extends 'base.html' %}

{% block content %}
<h1>Student Management Dashboard</h1>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Roll No</th>
            <th>Course</th>
            <th>Teacher</th>
            <th>Phone</th>
        </tr>
    </thead>
    <tbody>
        {% for s in students %}
        <tr>
            <td>{{ s.name }}</td>
            <td>{{ s.roll_no }}</td>
            <td>{{ s.course.name }}</td>  <td>{{ s.teacher.name }}</td> <td>{{ s.phone }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="5">No students enrolled yet.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
